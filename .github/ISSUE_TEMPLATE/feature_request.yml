name: Feature request
description: Propose an OpenFusion capability, integration, tool, or documentation improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        OpenFusion product paths use real provider calls. Please do not propose mock-data flows as user-facing behavior.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or runtime gap does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the behavior, API shape, UI change, or docs change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Fusion orchestration
        - Model routing
        - OpenAI-compatible API
        - Client integration
        - Web search or fetch
        - Local tools
        - Coding harness adapters
        - Storage or memory
        - UI and interaction
        - Documentation and DevEx
        - Benchmarks
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and risks
      description: Include security, cost, latency, provider availability, local-only assumptions, and failure modes.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
